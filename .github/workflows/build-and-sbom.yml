name: Build Wheels and Generate SBOM

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-wheel:
    name: Build wheel for Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build wheel
      id: build
      run: |
        python -m build --wheel
        echo "wheel_name=$(ls dist/*.whl | xargs -n 1 basename)" >> $GITHUB_OUTPUT
      continue-on-error: true

    - name: Display build error
      if: steps.build.outcome == 'failure'
      run: |
        echo "::error::Build failed for Python ${{ matrix.python-version }}"
        exit 1

    - name: Install Loom for SBOM generation
      if: steps.build.outcome == 'success'
      run: |
        pip install -e .

    - name: Generate SBOM
      id: sbom
      if: steps.build.outcome == 'success'
      run: |
        # Get wheel name and create SBOM filename following OpenSSF convention
        WHEEL_NAME="${{ steps.build.outputs.wheel_name }}"
        SBOM_NAME="${WHEEL_NAME}.spdx3.json"
        
        # Generate SBOM
        loom . -o "dist/${SBOM_NAME}" --creator-name "Loom CI" --creator-email "ci@loom.example"
        
        echo "sbom_name=${SBOM_NAME}" >> $GITHUB_OUTPUT
        echo "sbom_path=dist/${SBOM_NAME}" >> $GITHUB_OUTPUT
      continue-on-error: true

    - name: Display SBOM generation error
      if: steps.build.outcome == 'success' && steps.sbom.outcome == 'failure'
      run: |
        echo "::error::SBOM generation failed for Python ${{ matrix.python-version }}"

    - name: Install validation tools
      if: steps.sbom.outcome == 'success'
      run: |
        pip install jsonschema requests

    - name: Download SPDX 3 JSON Schema
      id: download-schema
      if: steps.sbom.outcome == 'success'
      run: |
        # Download SPDX 3.0.1 JSON Schema
        curl -sSL -o spdx-3.0.1-schema.json https://spdx.github.io/spdx-spec/v3.0.1/rdf/spdx-json-schema.json || \
        curl -sSL -o spdx-3.0.1-schema.json https://spdx.org/schema/3.0.1/spdx-json-schema.json || \
        echo "::warning::Could not download JSON Schema, will skip schema validation"
      continue-on-error: true

    - name: Validate SBOM with JSON Schema
      id: validate-json-schema
      if: steps.sbom.outcome == 'success'
      run: |
        python3 << 'EOF'
        import json
        import sys
        from pathlib import Path
        
        sbom_path = Path("${{ steps.sbom.outputs.sbom_path }}")
        schema_path = Path("spdx-3.0.1-schema.json")
        
        try:
            # Read the SBOM
            with open(sbom_path, 'r') as f:
                sbom = json.load(f)
            
            # Basic structure checks
            print('✓ Valid JSON')
            
            assert '@context' in sbom, 'Missing @context'
            print('✓ Has @context')
            
            assert '@graph' in sbom, 'Missing @graph'
            print('✓ Has @graph')
            
            assert isinstance(sbom['@graph'], list), '@graph must be a list'
            print('✓ @graph is a list')
            
            # Check required element types
            graph = sbom['@graph']
            types = {elem.get('type') for elem in graph}
            required = {'CreationInfo', 'Person', 'SpdxDocument', 'software_Sbom', 'software_Package'}
            missing = required - types
            
            if missing:
                print(f'❌ Missing required types: {missing}')
                sys.exit(1)
            
            print('✓ All required element types present')
            
            # Validate with JSON Schema if available
            if schema_path.exists():
                try:
                    from jsonschema import validate, ValidationError
                    with open(schema_path, 'r') as f:
                        schema = json.load(f)
                    validate(instance=sbom, schema=schema)
                    print('✓ JSON Schema validation passed')
                except ValidationError as ve:
                    print(f'⚠ JSON Schema validation warning: {ve.message}')
                except Exception as e:
                    print(f'⚠ JSON Schema validation skipped: {e}')
            else:
                print('⚠ JSON Schema not available, skipping schema validation')
            
            print(f'\n✅ SBOM validation passed: {sbom_path.name}')
            
        except Exception as e:
            print(f'❌ Validation failed: {e}')
            sys.exit(1)
        EOF
      continue-on-error: true

    - name: Install SHACL validation tools
      id: install-shacl
      if: steps.sbom.outcome == 'success'
      run: |
        pip install pyshacl rdflib
      continue-on-error: true

    - name: Download SPDX 3 SHACL shapes
      id: download-shacl
      if: steps.install-shacl.outcome == 'success'
      run: |
        # Download SPDX 3.0.1 SHACL shapes
        curl -sSL -o spdx-3.0.1-model.ttl https://spdx.github.io/spdx-spec/v3.0.1/rdf/spdx-model.ttl || \
        curl -sSL -o spdx-3.0.1-model.ttl https://spdx.org/rdf/3.0.1/spdx-model.ttl || \
        echo "::warning::Could not download SHACL shapes, will skip SHACL validation"
      continue-on-error: true

    - name: Validate SBOM with SHACL
      id: validate-shacl
      if: steps.install-shacl.outcome == 'success'
      run: |
        python3 << 'EOF'
        import sys
        from pathlib import Path
        
        sbom_path = Path("${{ steps.sbom.outputs.sbom_path }}")
        shacl_path = Path("spdx-3.0.1-model.ttl")
        
        if not shacl_path.exists():
            print('⚠ SHACL shapes not available, skipping SHACL validation')
            sys.exit(0)
        
        try:
            from pyshacl import validate
            from rdflib import Graph
            
            # Load the SBOM as RDF graph
            data_graph = Graph()
            data_graph.parse(sbom_path, format='json-ld')
            print('✓ SBOM loaded as RDF graph')
            
            # Load SHACL shapes
            shapes_graph = Graph()
            shapes_graph.parse(shacl_path, format='turtle')
            print('✓ SHACL shapes loaded')
            
            # Validate
            conforms, results_graph, results_text = validate(
                data_graph,
                shacl_graph=shapes_graph,
                inference='rdfs',
                abort_on_first=False,
            )
            
            if conforms:
                print('✅ SHACL validation passed')
            else:
                print('⚠ SHACL validation warnings:')
                print(results_text)
                # Don't fail on SHACL warnings for now
                
        except Exception as e:
            print(f'⚠ SHACL validation skipped: {e}')
            # Don't fail on SHACL validation errors
        EOF
      continue-on-error: true

    - name: Set validation status
      id: validate
      if: steps.sbom.outcome == 'success'
      run: |
        # Consider validation successful if JSON schema validation passed
        if [ "${{ steps.validate-json-schema.outcome }}" = "success" ]; then
          echo "Validation passed"
          exit 0
        else
          echo "Validation failed"
          exit 1
        fi
      continue-on-error: true

    - name: Display validation error
      if: steps.sbom.outcome == 'success' && steps.validate.outcome == 'failure'
      run: |
        echo "::error::SBOM validation failed for Python ${{ matrix.python-version }}"

    - name: Extract SBOM metadata for summary
      id: metadata
      if: steps.validate.outcome == 'success'
      run: |
        python3 << 'EOF'
        import json
        import os
        from pathlib import Path
        
        sbom_path = Path("${{ steps.sbom.outputs.sbom_path }}")
        
        with open(sbom_path, 'r') as f:
            sbom = json.load(f)
        
        graph = sbom['@graph']
        
        # Extract CreationInfo
        creation_info = next((e for e in graph if e.get('type') == 'CreationInfo'), {})
        created = creation_info.get('created', 'N/A')
        spec_version = creation_info.get('specVersion', 'N/A')
        
        # Extract Creator
        creators = [e for e in graph if e.get('type') == 'Person']
        creator_names = [c.get('name', 'Unknown') for c in creators]
        
        # Extract packages
        packages = [e for e in graph if e.get('type') == 'software_Package']
        main_package = packages[0] if packages else {}
        
        package_name = main_package.get('name', 'N/A')
        package_version = main_package.get('software_packageVersion', 'N/A')
        
        # Count dependencies (excluding main package)
        dep_count = len(packages) - 1 if len(packages) > 1 else 0
        
        # Sample dependencies (up to 5)
        sample_deps = []
        for pkg in packages[1:6]:
            dep_name = pkg.get('name', 'Unknown')
            dep_version = pkg.get('software_packageVersion', '')
            if dep_version:
                sample_deps.append(f"{dep_name} {dep_version}")
            else:
                sample_deps.append(dep_name)
        
        # Write to GitHub output
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"created={created}\n")
            f.write(f"spec_version={spec_version}\n")
            f.write(f"creators={', '.join(creator_names)}\n")
            f.write(f"package_name={package_name}\n")
            f.write(f"package_version={package_version}\n")
            f.write(f"dep_count={dep_count}\n")
            f.write(f"sample_deps={', '.join(sample_deps)}\n")
        EOF

    - name: Create Job Summary
      if: steps.validate.outcome == 'success'
      run: |
        cat >> $GITHUB_STEP_SUMMARY << 'EOF'
        ## 🎉 SBOM Generated Successfully - Python ${{ matrix.python-version }}
        
        ### Build Artifact
        - **Wheel**: `${{ steps.build.outputs.wheel_name }}`
        - **SBOM**: `${{ steps.sbom.outputs.sbom_name }}`
        
        ### Creation Information
        - **SPDX Version**: ${{ steps.metadata.outputs.spec_version }}
        - **Created**: ${{ steps.metadata.outputs.created }}
        - **Creator**: ${{ steps.metadata.outputs.creators }}
        
        ### Package Information
        - **Name**: ${{ steps.metadata.outputs.package_name }}
        - **Version**: ${{ steps.metadata.outputs.package_version }}
        - **Dependencies**: ${{ steps.metadata.outputs.dep_count }} packages
        
        ### Sample Dependencies
        ${{ steps.metadata.outputs.sample_deps }}
        
        ### Validation Status
        - ✅ JSON structure valid
        - ✅ Required SPDX 3 elements present
        - ${{ steps.validate-json-schema.outcome == 'success' && '✅' || '⚠️' }} JSON Schema validation
        - ${{ steps.validate-shacl.outcome == 'success' && '✅' || '⚠️' }} SHACL validation
        - ✅ Conforms to SPDX 3.0.1 specification
        
        EOF

    - name: Upload wheel artifact
      if: steps.build.outcome == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: wheel-py${{ matrix.python-version }}
        path: dist/*.whl
        retention-days: 7

    - name: Upload SBOM artifact
      if: steps.validate.outcome == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: sbom-py${{ matrix.python-version }}
        path: dist/*.spdx3.json
        retention-days: 7

    - name: Final status check
      if: always()
      run: |
        if [ "${{ steps.build.outcome }}" != "success" ]; then
          echo "::error::Build failed"
          exit 1
        fi
        if [ "${{ steps.sbom.outcome }}" != "success" ]; then
          echo "::error::SBOM generation failed"
          exit 1
        fi
        if [ "${{ steps.validate.outcome }}" != "success" ]; then
          echo "::error::SBOM validation failed"
          exit 1
        fi
        echo "✅ All checks passed!"
